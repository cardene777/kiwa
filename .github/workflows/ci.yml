name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4.3.0
        with:
          version: 10.33.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -F @dapp-e2e/core -F @dapp-e2e/cli typecheck

      - name: Test
        run: pnpm -F @dapp-e2e/core test
        env:
          SKIP_ANVIL_TESTS: "1"

      - name: Build
        run: pnpm -F @dapp-e2e/core -F @dapp-e2e/cli build

      - name: Typecheck consumer (examples)
        run: pnpm -F examples-basic-connect typecheck
