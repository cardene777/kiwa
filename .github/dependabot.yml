version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      github-actions-routine:
        patterns:
          - "actions/*"
          - "pnpm/*"
      changesets-action:
        patterns:
          - "changesets/*"
    ignore:
      - dependency-name: "changesets/action"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "🔧 chore(deps)"
    open-pull-requests-limit: 5
