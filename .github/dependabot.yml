version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      github-actions-routine:
        patterns:
          - "actions/*"
          - "pnpm/*"
      changesets-action:
        patterns:
          - "changesets/*"
    ignore:
      # dependabot は dependency-name で glob (*) をサポート (公式仕様)
      # https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file#ignore
      - dependency-name: "changesets/action"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "pnpm/*"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "🔧 chore(deps)"
    open-pull-requests-limit: 5
